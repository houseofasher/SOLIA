<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aureon — Neural Chat</title>
  <style>
    :root {
      --bg: #050508;
      --surface: rgba(18, 18, 28, 0.72);
      --surface-2: rgba(28, 28, 44, 0.85);
      --border: rgba(140, 120, 255, 0.18);
      --text: #eef0ff;
      --muted: #8b90b8;
      --accent: #7c6cff;
      --accent-2: #00e5cc;
      --glow: rgba(124, 108, 255, 0.35);
      --user: rgba(0, 229, 204, 0.12);
      --bot: rgba(124, 108, 255, 0.14);
      --radius: 16px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124, 108, 255, 0.25), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0, 229, 204, 0.08), transparent);
    }
    .shell {
      display: grid;
      grid-template-columns: 320px 1fr;
      max-width: 1400px;
      margin: 0 auto;
      min-height: 100vh;
      gap: 0;
    }
    @media (max-width: 900px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 1.25rem;
      backdrop-filter: blur(20px);
      background: var(--surface);
    }
    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.25rem;
    }
    .tagline { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; line-height: 1.4; }
    .panel {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      margin-bottom: 0.75rem;
      font-size: 0.8rem;
    }
    .panel h3 {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .stat { display: flex; justify-content: space-between; padding: 0.2rem 0; }
    .stat span:last-child { color: var(--accent-2); font-variant-numeric: tabular-nums; }
    .vital-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px #22c55e;
      margin-right: 6px;
    }
    .main { display: flex; flex-direction: column; min-height: 100vh; }
    .topbar {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      background: var(--surface);
    }
    .topbar label { font-size: 0.72rem; color: var(--muted); }
    .topbar input {
      flex: 1;
      min-width: 180px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.45rem 0.75rem;
      color: var(--text);
      font-size: 0.82rem;
    }
    .topbar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--glow); }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.9rem 1.1rem;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 0.92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user);
      border: 1px solid rgba(0, 229, 204, 0.25);
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
      border: 1px solid var(--border);
    }
    .msg.system {
      align-self: center;
      font-size: 0.78rem;
      color: var(--muted);
      background: transparent;
      border: none;
      padding: 0.25rem;
    }
    .composer {
      padding: 1rem 1.25rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      gap: 0.65rem;
    }
    .composer textarea {
      flex: 1;
      resize: none;
      min-height: 52px;
      max-height: 160px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92rem;
    }
    .composer textarea:focus { outline: none; border-color: var(--accent); }
    button.send {
      background: linear-gradient(135deg, var(--accent), #5a4fd4);
      border: none;
      border-radius: 14px;
      padding: 0 1.4rem;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.88rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button.send:hover { transform: translateY(-1px); box-shadow: 0 8px 24px var(--glow); }
    button.send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0 1.25rem 0.5rem; }
    .chip {
      font-size: 0.72rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="logo">Aureon ◈</div>
      <p class="tagline">Supervised neural brain · 2027 interface · connected to Railway</p>

      <div class="panel">
        <h3>Organism</h3>
        <div id="vitalLine"><span class="vital-dot"></span>Loading…</div>
      </div>
      <div class="panel">
        <h3>Auto-learn</h3>
        <div class="stat"><span>Cycles</span><span id="cycles">—</span></div>
        <div class="stat"><span>Next run</span><span id="nextRun">—</span></div>
        <div class="stat"><span>Target</span><span id="target">—</span></div>
      </div>
      <div class="panel">
        <h3>Brain</h3>
        <div class="stat"><span>Documents</span><span id="docs">—</span></div>
        <div class="stat"><span>Graduations</span><span id="grads">—</span></div>
        <div class="stat"><span>Micro-topics</span><span id="micros">—</span></div>
      </div>
      <div class="panel">
        <h3>Grade timing</h3>
        <p id="timing" style="color:var(--muted);line-height:1.45;font-size:0.75rem;">—</p>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <label>API base</label>
        <input id="apiBase" type="url" placeholder="https://your-app.up.railway.app" />
        <label>API key (optional)</label>
        <input id="apiKey" type="password" placeholder="AUREON_API_KEY" style="max-width:200px" />
      </div>
      <div class="messages" id="messages"></div>
      <div class="chips">
        <button type="button" class="chip" data-cmd="/status">Status</button>
        <button type="button" class="chip" data-cmd="/grades">Grades</button>
        <button type="button" class="chip" data-cmd="/help">Help</button>
      </div>
      <form class="composer" id="form">
        <textarea id="input" rows="2" placeholder="Chat with Aureon — try /status or ask about a topic…"></textarea>
        <button type="submit" class="send" id="sendBtn">Send</button>
      </form>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const messagesEl = $("messages");
    const sessionId = crypto.randomUUID();

    function base() {
      const v = $("apiBase").value.trim();
      return (v || window.location.origin).replace(/\/$/, "");
    }

    function loadConfig() {
      $("apiBase").value = localStorage.getItem("aureon_api_base") || window.location.origin;
      $("apiKey").value = localStorage.getItem("aureon_api_key") || "";
    }

    function saveConfig() {
      localStorage.setItem("aureon_api_base", $("apiBase").value.trim());
      localStorage.setItem("aureon_api_key", $("apiKey").value);
    }

    function addMsg(text, role) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      el.textContent = text.replace(/\*\*(.*?)\*\*/g, "$1");
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function fetchJson(path) {
      const r = await fetch(base() + path);
      if (!r.ok) throw new Error(r.status + " " + path);
      return r.json();
    }

    async function refreshSidebar() {
      try {
        const [vitals, auto, health] = await Promise.all([
          fetchJson("/organism/vitals"),
          fetchJson("/api/brain/auto-learn"),
          fetchJson("/health"),
        ]);
        $("vitalLine").innerHTML =
          `<span class="vital-dot" style="background:${vitals.vital ? "#22c55e" : "#ef4444"};box-shadow:0 0 8px ${vitals.vital ? "#22c55e" : "#ef4444"}"></span>` +
          (vitals.vital ? "Vital" : "Lockdown") +
          (health.ready ? " · Ready" : " · Booting");
        $("cycles").textContent = auto.cycles_completed ?? 0;
        $("nextRun").textContent = auto.next_run_at ? new Date(auto.next_run_at).toLocaleTimeString() : "—";
        const t = auto.current_target;
        $("target").textContent = t ? `${t.domain}.${t.subdomain}.${t.micro_subdomain}` : (auto.last_result?.target ? "idle" : "—");
      } catch (e) {
        $("vitalLine").textContent = "Offline — set API base to Railway URL";
      }
    }

    async function refreshLearning() {
      try {
        const r = await fetch(base() + "/api/chat/learning");
        const b = r.ok ? await r.json() : null;
        if (!b) return;
        $("docs").textContent = b.brain?.documents ?? "—";
        $("grads").textContent = b.brain?.grade_levels_graduated ?? "—";
        $("micros").textContent = b.brain?.micro_subdomains ?? "—";
        const est = b.timeline?.estimates;
        if (est) {
          $("timing").textContent =
            `1 grade ≈ ${est.one_grade_step} · 1 topic PhD path ≈ ${est.one_micro_subdomain_all_grades} · full corpus ≈ ${est.full_corpus_sequential}`;
        }
      } catch (_) {}
    }

    async function sendMessage(text) {
      saveConfig();
      addMsg(text, "user");
      $("sendBtn").disabled = true;
      try {
        const r = await fetch(base() + "/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, session_id: sessionId }),
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.detail || r.statusText);
        addMsg(data.reply, "bot");
        if (data.classification) {
          addMsg(`↳ classified: ${data.classification.label} (${Math.round(data.classification.confidence * 100)}%)`, "system");
        }
        refreshSidebar();
        refreshLearning();
      } catch (e) {
        addMsg("Error: " + e.message + ". Check API base points to your Railway domain.", "system");
      } finally {
        $("sendBtn").disabled = false;
      }
    }

    $("form").addEventListener("submit", (e) => {
      e.preventDefault();
      const text = $("input").value.trim();
      if (!text) return;
      $("input").value = "";
      sendMessage(text);
    });

    document.querySelectorAll(".chip").forEach((btn) => {
      btn.addEventListener("click", () => sendMessage(btn.dataset.cmd));
    });

    loadConfig();
    addMsg("Aureon neural chat online. I learn via supervised grade cycles on Railway — try /status or /grades.", "system");
    refreshSidebar();
    refreshLearning();
    setInterval(refreshSidebar, 30000);
    setInterval(refreshLearning, 60000);
  </script>
</body>
</html>
